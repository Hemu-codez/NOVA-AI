<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova — AI Assistant</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-dot">✦</div>
      <span class="logo-text">Nova AI</span>
    </div>

    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>

    <div class="sidebar-section-label">Recent</div>
    <ul class="history-list" id="historyList">
      <!-- Chat history items injected by JS -->
    </ul>

    <div class="sidebar-footer">
      <span>Built by Hemu :)</span>
    </div>
  </aside>

  <!-- ── Main Chat Area ── -->
  <main class="chat-main">

    <!-- Header -->
    <header class="chat-header">
      <button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>
      <span class="header-title" id="headerTitle">New Conversation</span>
      <button class="clear-btn" onclick="newChat()" title="New chat">&#10005;</button>
    </header>

    <!-- Messages -->
    <div class="messages-container" id="messagesContainer">
      <!-- Welcome screen shown when no messages -->
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-orb">✦</div>
        <h1 class="welcome-title">
  Meet <span>Nova</span> 
</h1>
<p class="welcome-sub">
  Your intelligent AI companion for ideas, coding, and creativity.
</p>
        <p class="welcome-sub">Your AI assistant. Ask me anything.</p>
        <div class="suggestions">
          <button class="suggestion-chip" onclick="useSuggestion(this)">What can you help me with?</button>
          <button class="suggestion-chip" onclick="useSuggestion(this)">Write me a short poem</button>
          <button class="suggestion-chip" onclick="useSuggestion(this)">Explain quantum computing simply</button>
          <button class="suggestion-chip" onclick="useSuggestion(this)">Give me 5 productivity tips</button>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-box">
        <textarea
          id="userInput"
          placeholder="Message Nova..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <p class="input-disclaimer">Nova can make mistakes. Verify important info.</p>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
